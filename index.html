<!DOCTYPE html>
<html lang="si" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Media Share Pro</title>

    <!-- Firebase SDKs (v9 compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js">
    </script>

    <!-- QR Code Library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js">
    </script>

    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-hover: #1c2333;
            --border: #30363d;
            --text: #e6edf3;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79b8ff;
            --danger: #f85149;
            --success: #3fb950;
            --warning: #d2991d;
            --glass-bg: rgba(22, 27, 34, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --surface-hover: #f0f0f5;
            --border: #dcdde3;
            --text: #1a1a2e;
            --text-secondary: #6b7280;
            --accent: #2563eb;
            --accent-hover: #3b82f6;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.06);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            transition: background var(--transition), color var(--transition);
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(88, 166, 255, 0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 70% 60%, rgba(63, 185, 80, 0.04) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 80%, rgba(210, 153, 29, 0.03) 0%, transparent 55%);
            z-index: -1;
            animation: bgShift 20s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes bgShift {
            0%,
            100% {
                transform: translate(0, 0);
            }
            33% {
                transform: translate(-2%, 1%);
            }
            66% {
                transform: translate(1%, -2%);
            }
        }

        .file-warning {
            background: #f85149;
            color: #fff;
            text-align: center;
            padding: 14px 20px;
            font-weight: 600;
            font-size: 0.9rem;
            display: none;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(248, 81, 73, 0.4);
            animation: pulse 2s infinite;
        }
        .file-warning.show {
            display: block;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.85;
            }
        }
        .file-warning code {
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 10px;
            border-radius: 5px;
            margin: 0 4px;
            font-size: 0.85rem;
        }

        .navbar {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 14px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.15);
        }
        .navbar .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .navbar .logo .icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: #fff;
        }
        .nav-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: var(--text);
            text-decoration: none;
            padding: 9px 18px;
            border-radius: 25px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all var(--transition);
            background: transparent;
            border: 1px solid transparent;
        }
        .nav-links a:hover,
        .nav-links a.active {
            background: var(--surface-hover);
            border-color: var(--border);
        }
        .theme-toggle {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-size: 1.2rem;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .theme-toggle:hover {
            background: var(--surface-hover);
            transform: rotate(20deg);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px 60px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 30px;
            margin-bottom: 24px;
            box-shadow: var(--glass-shadow);
            transition: all var(--transition);
        }
        .glass-card:hover {
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }
        .glass-card h2 {
            font-size: 1.4rem;
            margin-bottom: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 50px 30px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition);
            background: var(--surface);
            position: relative;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .upload-zone.drag-over {
            border-color: var(--accent);
            background: rgba(88, 166, 255, 0.05);
            box-shadow: 0 0 40px rgba(88, 166, 255, 0.15);
            transform: scale(1.01);
        }
        .upload-zone .upload-icon {
            font-size: 3.5rem;
            opacity: 0.7;
        }
        .upload-zone p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        .upload-zone .browse-btn {
            display: inline-block;
            background: var(--accent);
            color: #fff;
            padding: 10px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all var(--transition);
            border: none;
        }
        .upload-zone .browse-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(88, 166, 255, 0.3);
        }
        .upload-zone input[type="file"] {
            display: none;
        }
        .file-info {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .progress-container {
            margin-top: 16px;
            display: none;
        }
        .progress-container.active {
            display: block;
        }
        .progress-bar-wrapper {
            background: var(--border);
            border-radius: 20px;
            height: 12px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #8b5cf6);
            border-radius: 20px;
            transition: width 0.3s ease;
            width: 0%;
        }
        .progress-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-align: center;
        }

        .result-section {
            display: none;
            margin-top: 20px;
            animation: fadeInUp 0.5s ease;
        }
        .result-section.active {
            display: block;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .link-box {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            background: var(--surface);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            border: 1px solid var(--border);
        }
        .link-box input {
            flex: 1;
            min-width: 200px;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 0.9rem;
            padding: 8px;
            outline: none;
            font-family: 'SF Mono', 'Consolas', monospace;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid var(--border);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all var(--transition);
            background: var(--surface);
            color: var(--text);
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn:hover {
            background: var(--surface-hover);
            transform: translateY(-1px);
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 16px rgba(88, 166, 255, 0.3);
        }
        .btn-danger {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger);
        }
        .btn-danger:hover {
            opacity: 0.9;
            box-shadow: 0 4px 16px rgba(248, 81, 73, 0.3);
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.78rem;
            border-radius: 20px;
        }
        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .qr-container {
            text-align: center;
            margin: 16px 0;
            display: flex;
            justify-content: center;
        }
        .qr-container canvas,
        .qr-container img {
            border-radius: 12px;
            padding: 10px;
            background: #fff;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            max-width: 200px;
        }
        .qr-actions {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            padding: 14px 22px;
            border-radius: 25px;
            color: #fff;
            font-weight: 500;
            font-size: 0.9rem;
            animation: slideInRight 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            max-width: 380px;
            word-break: break-word;
            pointer-events: auto;
        }
        .toast.success {
            background: #238636;
        }
        .toast.error {
            background: #da3633;
        }
        .toast.info {
            background: #1f6feb;
        }
        @keyframes slideInRight {
            from {
                transform: translateX(120%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }

        .table-wrapper {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th,
        td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        tr:hover td {
            background: var(--surface-hover);
        }
        .search-input {
            width: 100%;
            padding: 12px 18px;
            border-radius: 25px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
            transition: all var(--transition);
            margin-bottom: 16px;
        }
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 14px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--surface);
            border-radius: var(--radius-sm);
            padding: 18px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .stat-card .number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }
        .stat-card .label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .viewer-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            padding: 20px;
            flex-direction: column;
            gap: 16px;
        }
        .viewer-container img,
        .viewer-container video {
            max-width: 100%;
            max-height: 75vh;
            border-radius: var(--radius);
            box-shadow: var(--glass-shadow);
        }
        .viewer-container video {
            width: 100%;
            max-width: 900px;
            background: #000;
            border-radius: var(--radius);
        }
        .viewer-error {
            text-align: center;
            color: var(--danger);
            font-size: 1.1rem;
            padding: 20px;
        }
        .viewer-loader {
            font-size: 1.2rem;
            color: var(--text-secondary);
            animation: pulse-anim 1.5s infinite;
        }
        @keyframes pulse-anim {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        @media (max-width: 640px) {
            .navbar {
                padding: 10px 14px;
            }
            .navbar .logo {
                font-size: 1.2rem;
            }
            .glass-card {
                padding: 18px;
            }
            .upload-zone {
                padding: 30px 16px;
            }
            .upload-zone .upload-icon {
                font-size: 2.5rem;
            }
            .btn {
                padding: 8px 14px;
                font-size: 0.78rem;
            }
            table {
                font-size: 0.75rem;
            }
            th,
            td {
                padding: 8px 6px;
            }
        }
    </style>
</head>

        Firebase Storage <strong>will NOT work</strong> due to CORS policy.

        <br><small>Open terminal in this folder and run: <code>npx serve .</code> then open <code>http://localhost:3000</code></small>
    </div>

    <nav class="navbar">
        <div class="logo">
            <span class="icon">📁</span> Smart Media Share Pro
        </div>
        <div class="nav-links" id="navLinks">

        </div>
        <button class="theme-toggle" id="themeToggle" title="Toggle Dark/Light Mode">🌓</button>

    <div class="container" id="mainContent"></div>

    <div class="toast-container" id="toastContainer"></div>

    <script>

        const isFileProtocol = window.location.protocol === 'file:';

    <script>
        function generateUniqueId() {
            const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = '';
            const array = new Uint8Array(10);
            crypto.getRandomValues(array);
            for (let i = 0; i < 10; i++) {
                result += chars[array[i] % chars.length];
            }
            return result;
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                if (toast.parentNode) toast.remove();
            }, 3000);
        }

        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                showToast('✅ Link copied to clipboard!', 'success');
            } catch (err) {
                const input = document.createElement('input');
                input.value = text;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                showToast('✅ Link copied!', 'success');
            }
        }

        function sanitize(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatFileSize(bytes) {
            if (!bytes || bytes === 0) return '0 B';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(2) + ' KB';
            if (bytes < 1073741824) return (bytes / 1048576).toFixed(2) + ' MB';
            return (bytes / 1073741824).toFixed(2) + ' GB';
        }

        function formatDate(timestamp) {
            if (!timestamp) return 'N/A';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            if (isNaN(date.getTime())) return 'N/A';
            return date.toLocaleString('si-LK', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function getCurrentPage() {
            const path = window.location.pathname;
            if (path.includes('dashboard')) return 'dashboard';
            if (path.includes('view')) return 'view';
            return 'index';
        }

        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        if (themeToggle) {
            themeToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
            themeToggle.addEventListener('click', () => {
                const current = html.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', next);
                themeToggle.textContent = next === 'dark' ? '☀️' : '🌙';
                localStorage.setItem('theme', next);
            });
        }

        const currentPage = getCurrentPage();
        const mainContent = document.getElementById('mainContent');
        const navLinks = document.querySelectorAll('.nav-links a');

        navLinks.forEach(link => {
            if (link.getAttribute('data-page') === currentPage) {
                link.classList.add('active');
            } else {
                link.classList.remove('active');
            }
        });

        if (currentPage === 'index') {
            renderUploadPage();
        }

        function renderUploadPage() {
            mainContent.innerHTML = `
                <div class="glass-card">
                    <h2>📤 Upload Media File</h2>
                    <div class="upload-zone" id="uploadZone">
                        <span class="upload-icon">📁</span>
                        <p><strong>Drag & Drop</strong> your file here or click to browse</p>
                        <p class="file-info">Supported: Images (JPG, PNG, GIF, WebP) & Videos (MP4, WebM, MOV) • Max 100MB</p>
                        <label class="browse-btn" for="fileInput">Browse Files</label>
                        <input type="file" id="fileInput" accept="image/*,video/*">
                    </div>
                    <div class="progress-container" id="progressContainer">
                        <p class="progress-text" id="progressText">Uploading... 0%</p>
                        <div class="progress-bar-wrapper">
                            <div class="progress-bar-fill" id="progressFill"></div>
                        </div>
                    </div>
                </div>

                <div class="glass-card result-section" id="resultSection">
                    <h2>✅ Upload Complete!</h2>
                    <p style="color:var(--text-secondary);margin-bottom:12px;">Your file is ready to share</p>
                    <div class="link-box">
                        <input type="text" id="shareLink" readonly value="">
                        <button class="btn btn-primary btn-sm" onclick="copyShareLink()">📋 Copy</button>
                    </div>
                    <div class="qr-container" id="qrContainer"></div>
                    <div class="qr-actions">
                        <button class="btn btn-sm" onclick="downloadQR()">💾 Download QR</button>
                        <button class="btn btn-sm" onclick="shareVia('whatsapp')">💬 WhatsApp</button>
                        <button class="btn btn-sm" onclick="shareVia('facebook')">📘 Facebook</button>
                        <button class="btn btn-sm" onclick="shareVia('telegram')">✈️ Telegram</button>
                        <button class="btn btn-sm" onclick="shareVia('native')">🔗 Share</button>
                    </div>
                </div>
            `;

            bindUploadEvents();
        }

        function bindUploadEvents() {
            const uploadZone = document.getElementById('uploadZone');
            const fileInput = document.getElementById('fileInput');
            const progressContainer = document.getElementById('progressContainer');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const resultSection = document.getElementById('resultSection');
            const shareLinkInput = document.getElementById('shareLink');
            const qrContainer = document.getElementById('qrContainer');

            let currentShareLink = '';
            let qrCodeInstance = null;

            if (isFileProtocol) {
                uploadZone.style.opacity = '0.6';
                uploadZone.style.pointerEvents = 'none';
                const warningMsg = document.createElement('p');
                warningMsg.style.color = '#f85149';
                warningMsg.style.fontWeight = 'bold';
                warningMsg.style.marginTop = '10px';
                warningMsg.textContent =
                    '⚠️ Upload disabled: Run via npx serve . or Live Server (file:// protocol not supported by Firebase CORS)';
                uploadZone.parentElement.appendChild(warningMsg);
                return;
            }

            if (!firebaseInitialized) {
                showToast('❌ Firebase not initialized. Check your config.', 'error');
                return;
            }

            uploadZone.addEventListener('click', (e) => {
                if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'LABEL') {
                    fileInput.click();
                }
            });

            const browseBtn = uploadZone.querySelector('.browse-btn');
            if (browseBtn) {
                browseBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    fileInput.click();
                });
            }

            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    handleFileUpload(e.target.files[0]);
                    fileInput.value = '';
                }
            });

            uploadZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadZone.classList.add('drag-over');
            });
            uploadZone.addEventListener('dragleave', () => {
                uploadZone.classList.remove('drag-over');
            });
            uploadZone.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadZone.classList.remove('drag-over');
                if (e.dataTransfer.files.length > 0) {
                    handleFileUpload(e.dataTransfer.files[0]);
                }
            });

            async function handleFileUpload(file) {
                const allowedImageTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
                const allowedVideoTypes = ['video/mp4', 'video/webm', 'video/quicktime', 'video/x-msvideo'];
                const allAllowed = [...allowedImageTypes, ...allowedVideoTypes];

                if (!allAllowed.includes(file.type)) {
                    showToast('❌ Unsupported file type. Please upload an image or video.', 'error');
                    return;
                }
                if (file.size > 100 * 1024 * 1024) {
                    showToast('❌ File too large! Maximum size is 100MB.', 'error');
                    return;
                }

                progressContainer.classList.add('active');
                resultSection.classList.remove('active');
                progressFill.style.width = '0%';
                progressText.textContent = 'Preparing upload...';

                const uniqueId = generateUniqueId();
                const fileExt = file.name.split('.').pop() || 'file';
                const safeFileName = uniqueId + '.' + fileExt;
                const storageRef = storage.ref('uploads/' + safeFileName);

                try {
                    const uploadTask = storageRef.put(file, {
                        contentType: file.type,
                        customMetadata: {
                            originalName: file.name,
                            uniqueId: uniqueId
                        }
                    });

                    uploadTask.on('state_changed',
                        (snapshot) => {
                            const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                            progressFill.style.width = progress + '%';
                            progressText.textContent =
                                `Uploading... ${progress.toFixed(1)}% (${formatFileSize(snapshot.bytesTransferred)} / ${formatFileSize(snapshot.totalBytes)})`;
                        },
                        (error) => {
                            console.error('Upload error:', error);
                            progressContainer.classList.remove('active');
                            let errorMsg = 'Upload failed: ';
                            if (error.code === 'storage/unauthorized') {
                                errorMsg += 'Permission denied. Check Firebase Storage Rules.';
                            } else if (error.code === 'storage/retry-limit-exceeded') {
                                errorMsg += 'Network error. Please try again.';
                            } else {
                                errorMsg += error.message;
                            }
                            if (isFileProtocol) {
                                errorMsg += ' (Running from file:// - use npx serve . instead)';
                            }
                            showToast('❌ ' + errorMsg, 'error');
                        },
                        async () => {
                            progressContainer.classList.remove('active');
                            const downloadUrl = await uploadTask.snapshot.ref.getDownloadURL();

                            const docData = {
                                fileName: file.name,
                                fileType: file.type,
                                fileSize: file.size,
                                downloadUrl: downloadUrl,
                                uniqueId: uniqueId,
                                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                                storagePath: 'uploads/' + safeFileName
                            };

                            await uploadsCollection.doc(uniqueId).set(docData);

                            const origin = window.location.origin;
                            const pathBase = window.location.pathname.replace(/\/[^\/]*$/, '');
                            currentShareLink = origin + pathBase + '/view.html?id=' + uniqueId;
                            if (currentShareLink.includes('index.html')) {
                                currentShareLink = currentShareLink.replace('index.html', 'view.html');
                            }

                            shareLinkInput.value = currentShareLink;
                            resultSection.classList.add('active');

                            qrContainer.innerHTML = '';
                            qrCodeInstance = new QRCode(qrContainer, {
                                text: currentShareLink,
                                width: 180,
                                height: 180,
                                colorDark: '#000000',
                                colorLight: '#ffffff',
                                correctLevel: QRCode.CorrectLevel.H
                            });

                            showToast('✅ Upload successful! Share link generated.', 'success');
                            resultSection.scrollIntoView({ behavior: 'smooth' });
                        }
                    );
                } catch (error) {
                    console.error('Unexpected error:', error);
                    progressContainer.classList.remove('active');
                    showToast('❌ Error: ' + error.message, 'error');
                }
            }

            window.copyShareLink = function() {
                if (currentShareLink) copyToClipboard(currentShareLink);
            };

            window.downloadQR = function() {
                const canvas = qrContainer.querySelector('canvas');
                if (canvas) {
                    const link = document.createElement('a');
                    link.download = 'qr-code-' + Date.now() + '.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    showToast('✅ QR code downloaded!', 'success');
                }
            };

            window.shareVia = function(platform) {
                if (!currentShareLink) return;
                const encoded = encodeURIComponent(currentShareLink);
                const text = encodeURIComponent('Check out this file I shared via Smart Media Share Pro!');
                let url = '';
                switch (platform) {
                    case 'whatsapp':
                        url = `https://wa.me/?text=${text}%20${encoded}`;
                        break;
                    case 'facebook':
                        url = `https://www.facebook.com/sharer/sharer.php?u=${encoded}`;
                        break;
                    case 'telegram':
                        url = `https://t.me/share/url?url=${encoded}&text=${text}`;
                        break;
                    case 'native':
                        if (navigator.share) {
                            navigator.share({ title: 'Shared File', url: currentShareLink }).catch(() => {});
                            return;
                        }
                        copyToClipboard(currentShareLink);
                        return;
                }
                window.open(url, '_blank', 'width=600,height=400');
            };
        }

        if (currentPage === 'dashboard') {
            renderDashboardPage();
        }

        async function renderDashboardPage() {
            mainContent.innerHTML = `
                <div class="glass-card">
                    <h2>📊 Admin Dashboard</h2>
                    <div class="stats-row" id="statsRow">
                        <div class="stat-card"><div class="number" id="statTotal">-</div><div class="label">Total Uploads</div></div>
                        <div class="stat-card"><div class="number" id="statImages">-</div><div class="label">Images</div></div>
                        <div class="stat-card"><div class="number" id="statVideos">-</div><div class="label">Videos</div></div>
                    </div>
                    <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search by file name...">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>File Name</th>
                                    <th>Type</th>
                                    <th>Size</th>
                                    <th>Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                                <tr><td colspan="5" style="text-align:center;padding:30px;">Loading uploads...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            if (!firebaseInitialized) {
                document.getElementById('tableBody').innerHTML =
                    '<tr><td colspan="5" style="text-align:center;color:var(--danger);">❌ Firebase not initialized. Check config.</td></tr>';
                return;
            }

            if (isFileProtocol) {
                document.getElementById('tableBody').innerHTML =
                    '<tr><td colspan="5" style="text-align:center;color:var(--warning);">⚠️ Running from file:// - Firebase may not connect. Use local server.</td></tr>';
            }

            await loadDashboardData();
            document.getElementById('searchInput').addEventListener('input', filterTable);
        }

        let allUploadsData = [];

        async function loadDashboardData() {
            try {
                const snapshot = await uploadsCollection.orderBy('createdAt', 'desc').get();
                allUploadsData = [];
                snapshot.forEach(doc => {
                    allUploadsData.push({ id: doc.id, ...doc.data() });
                });
                updateStats();
                renderTable(allUploadsData);
            } catch (error) {
                console.error('Dashboard error:', error);
                document.getElementById('tableBody').innerHTML =
                    '<tr><td colspan="5" style="text-align:center;color:var(--danger);">❌ Error loading data: ' +
                    sanitize(error.message) + '</td></tr>';
                showToast('❌ Failed to load dashboard: ' + error.message, 'error');
            }
        }

        function updateStats() {
            const total = allUploadsData.length;
            const images = allUploadsData.filter(d => d.fileType && d.fileType.startsWith('image/')).length;
            const videos = allUploadsData.filter(d => d.fileType && d.fileType.startsWith('video/')).length;
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statImages').textContent = images;
            document.getElementById('statVideos').textContent = videos;
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            if (data.length === 0) {
                tbody.innerHTML =
                    '<tr><td colspan="5" style="text-align:center;padding:30px;">No uploads found.</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(d => `
                <tr>
                    <td title="${sanitize(d.fileName || 'N/A')}">${sanitize((d.fileName || 'N/A').substring(0, 40))}${(d.fileName || '').length > 40 ? '...' : ''}</td>
                    <td>${d.fileType ? (d.fileType.startsWith('image/') ? '🖼️ Image' : '🎬 Video') : 'N/A'}</td>
                    <td>${formatFileSize(d.fileSize || 0)}</td>
                    <td>${formatDate(d.createdAt)}</td>
                    <td style="display:flex;gap:6px;flex-wrap:wrap;">
                        <button class="btn btn-sm btn-primary" data-action="copy" data-id="${d.uniqueId}">📋</button>
                        <button class="btn btn-sm" data-action="view" data-id="${d.uniqueId}">👁️</button>
                        <button class="btn btn-sm btn-danger" data-action="delete" data-id="${d.id}">🗑️</button>
                    </td>
                </tr>
            `).join('');

            tbody.querySelectorAll('button[data-action="copy"]').forEach(btn => {
                btn.addEventListener('click', () => copyDashboardLink(btn.dataset.id));
            });
            tbody.querySelectorAll('button[data-action="view"]').forEach(btn => {
                btn.addEventListener('click', () => openViewer(btn.dataset.id));
            });
            tbody.querySelectorAll('button[data-action="delete"]').forEach(btn => {
                btn.addEventListener('click', () => deleteUpload(btn.dataset.id));
            });
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allUploadsData.filter(d =>
                (d.fileName || '').toLowerCase().includes(query)
            );
            renderTable(filtered);
        }

        function copyDashboardLink(uniqueId) {
            const origin = window.location.origin;
            const pathBase = window.location.pathname.replace(/\/[^\/]*$/, '');
            let link = origin + pathBase + '/view.html?id=' + uniqueId;
            if (link.includes('dashboard.html')) {
                link = link.replace('dashboard.html', 'view.html');
            }
            copyToClipboard(link);
        }

        function openViewer(uniqueId) {
            const origin = window.location.origin;
            const pathBase = window.location.pathname.replace(/\/[^\/]*$/, '');
            let link = origin + pathBase + '/view.html?id=' + uniqueId;
            if (link.includes('dashboard.html')) {
                link = link.replace('dashboard.html', 'view.html');
            }
            window.open(link, '_blank');
        }

        async function deleteUpload(docId) {
            if (!confirm('Are you sure you want to delete this upload? This action cannot be undone.')) return;
            try {
                const doc = await uploadsCollection.doc(docId).get();
                if (doc.exists) {
                    const data = doc.data();
                    if (data.storagePath) {
                        try {
                            await storage.ref(data.storagePath).delete();
                        } catch (e) {
                            console.warn('Storage delete warning:', e);
                        }
                    }
                    await uploadsCollection.doc(docId).delete();
                    showToast('✅ Upload deleted successfully!', 'success');
                    await loadDashboardData();
                }
            } catch (error) {
                console.error('Delete error:', error);
                showToast('❌ Delete failed: ' + error.message, 'error');
            }
        }

        if (currentPage === 'view') {
            renderViewerPage();
        }

        async function renderViewerPage() {
            const urlParams = new URLSearchParams(window.location.search);
            const uniqueId = urlParams.get('id');

            mainContent.innerHTML = `
                <div class="viewer-container" id="viewerContainer">
                    <div class="viewer-loader">⏳ Loading media...</div>
                </div>
            `;

            if (!uniqueId) {
                document.getElementById('viewerContainer').innerHTML =
                    '<div class="viewer-error">❌ No ID provided. Please use a valid share link.</div>';
                return;
            }

            if (!firebaseInitialized) {
                document.getElementById('viewerContainer').innerHTML =
                    '<div class="viewer-error">❌ Firebase not initialized. Cannot load media.</div>';
                return;
            }

            const safeId = sanitize(uniqueId);

            try {
                const doc = await uploadsCollection.doc(safeId).get();
                if (!doc.exists) {
                    document.getElementById('viewerContainer').innerHTML =
                        '<div class="viewer-error">❌ Media not found. The link may be invalid or expired.</div>';
                    return;
                }
                const data = doc.data();
                const fileType = data.fileType || '';
                const downloadUrl = data.downloadUrl;
                const fileName = sanitize(data.fileName || 'Shared Media');

                document.title = fileName + ' - Smart Media Share Pro';

                if (fileType.startsWith('image/')) {
                    document.getElementById('viewerContainer').innerHTML = `
                        <img src="${downloadUrl}" alt="${fileName}" loading="eager"
                             onerror="this.parentElement.innerHTML='<div class=\\'viewer-error\\'>❌ Failed to load image. The file may have been deleted.</div>'">
                        <p style="color:var(--text-secondary);font-size:0.85rem;">${fileName}</p>
                    `;
                } else if (fileType.startsWith('video/')) {
                    document.getElementById('viewerContainer').innerHTML = `
                        <video controls autoplay playsinline preload="metadata"
                               onerror="this.parentElement.innerHTML='<div class=\\'viewer-error\\'>❌ Failed to load video.</div>'">
                            <source src="${downloadUrl}" type="${fileType}">
                            Your browser does not support the video tag.
                        </video>
                        <p style="color:var(--text-secondary);font-size:0.85rem;">${fileName}</p>
                    `;
                } else {
                    document.getElementById('viewerContainer').innerHTML =
                        '<div class="viewer-error">❌ Unsupported media type.</div>';
                }
            } catch (error) {
                console.error('Viewer error:', error);
                document.getElementById('viewerContainer').innerHTML =
                    '<div class="viewer-error">❌ Error loading media: ' + sanitize(error.message) + '</div>';
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Party Video</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: black; overflow: hidden; }
    #videoContainer {
      width: 100vw; height: 100vh; display: flex;
      align-items: center; justify-content: center;
    }
    video {
      max-width: 100%; max-height: 100%;
      object-fit: contain; /* full area fill ඕනනම් 'cover' දාන්න */
    }
    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); color: white; font-size: 24px;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; cursor: pointer;
    }
    #overlay button {
      padding: 15px 30px; font-size: 20px; margin-top: 15px;
      cursor: pointer; background: #ff4081; border: none; color: white; border-radius: 8px;
    }
  </style>
</head>
<body>
  <div id="videoContainer">
    <video id="videoPlayer" playsinline muted loop></video>
  </div>
  <div id="overlay">
    <span>🎬 Tap to Play Fullscreen</span>
    <button id="playBtn">▶ Play Fullscreen</button>
  </div>

  <!-- Firebase Compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script>
    // ========== ඔබේ Firebase config එක ==========
    const firebaseConfig = {
     apiKey: "AIzaSyCp_IQVnoxPKHcpShm2nMQ6v1Dh0GmPTjA",
  authDomain: "secretaryapp-b4d89.firebaseapp.com",
  projectId: "secretaryapp-b4d89",
  storageBucket: "secretaryapp-b4d89.firebasestorage.app",
  messagingSenderId: "288327170368",
  appId: "1:288327170368:web:d21ae8902bf6b63d79e2a5"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get('id');
    const videoElement = document.getElementById('videoPlayer');
    const overlay = document.getElementById('overlay');
    const playBtn = document.getElementById('playBtn');

    if (!videoId) {
      overlay.innerHTML = '<span>❌ Video ID not found</span>';
      overlay.style.cursor = 'default';
    } else {
      // Firestore වලින් video URL ගන්න
      db.collection('videos').doc(videoId).get()
        .then(doc => {
          if (doc.exists) {
            const data = doc.data();
            videoElement.src = data.videoUrl;
            videoElement.load();

            // Auto attempt: mute + play + fullscreen (browser block වෙන්න පුළුවන්)
            videoElement.muted = true;
            videoElement.play().then(() => {
              videoElement.requestFullscreen().catch(() => {
                // fullscreen rejected, overlay පෙන්වන්න
                overlay.style.display = 'flex';
              });
            }).catch(() => {
              overlay.style.display = 'flex';
            });

            // Button click: start fullscreen with sound if user interacted
            function enterFullscreenWithSound() {
              videoElement.muted = false; // sound enable
              videoElement.play();
              videoElement.requestFullscreen().catch(e => console.warn(e));
              overlay.style.display = 'none';
            }

            playBtn.addEventListener('click', enterFullscreenWithSound);
            overlay.addEventListener('click', (e) => {
              if (e.target === overlay) enterFullscreenWithSound();
            });

            // If auto fullscreen worked, hide overlay
            videoElement.addEventListener('fullscreenchange', () => {
              if (document.fullscreenElement) {
                overlay.style.display = 'none';
              } else {
                // user exited fullscreen, show overlay again
                overlay.style.display = 'flex';
              }
            });

          } else {
            overlay.innerHTML = '<span>❌ Video not found</span>';
            overlay.style.cursor = 'default';
          }
        })
        .catch(err => {
          overlay.innerHTML = '<span>❌ Error loading video</span>';
          console.error(err);
        });
    }
  </script>
</body>
</html>
